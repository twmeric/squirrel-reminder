<!DOCTYPE html>
<html lang=\"zh-TW\">
<head>
    <meta charset=\"UTF-8\">
    <meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">
    <title>松鼠提醒 MVP</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 400px; margin: 0 auto; }
        .header { text-align: center; color: white; margin-bottom: 30px; }
        .card {
            background: white;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        input {
            width: 100%;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 1rem;
            margin-bottom: 10px;
        }
        button {
            width: 100%;
            padding: 18px;
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            margin-bottom: 10px;
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .btn-danger { background: #f44336; color: white; }
        .status {
            display: flex;
            align-items: center;
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 12px;
            background: #f5f5f5;
        }
        .status.active { background: #E8F5E9; border: 2px solid #4CAF50; }
    </style>
</head>
<body>
    <div class=\"container\">
        <div class=\"header\">
            <h1>松鼠提醒 MVP</h1>
            <p>低頭玩手機，松鼠叫醒你</p>
        </div>
        
        <div class=\"card\">
            <h2>系統狀態</h2>
            <div class=\"status\" id=\"statusGPS\">
                <span style=\"font-size: 2rem; margin-right: 15px;\">📡</span>
                <div>
                    <div>GPS 定位</div>
                    <small id=\"gpsText\">等待啟動...</small>
                </div>
            </div>
        </div>
        
        <div class=\"card\">
            <h2>設置路線</h2>
            <input type=\"text\" id=\"startStation\" placeholder=\"起點站\" value=\"羅湖\">
            <input type=\"text\" id=\"endStation\" placeholder=\"終點站\" value=\"福田\">
            <button class=\"btn-primary\" onclick=\"startTracking()\">開始追蹤</button>
            <button class=\"btn-danger\" onclick=\"stopTracking()\">停止追蹤</button>
        </div>
    </div>

    <script>
        function startTracking() {
            alert('開始追蹤: ' + document.getElementById('startStation').value + ' → ' + document.getElementById('endStation').value);
            document.getElementById('statusGPS').classList.add('active');
            document.getElementById('gpsText').textContent = '追蹤中';
        }
        function stopTracking() {
            document.getElementById('statusGPS').classList.remove('active');
            document.getElementById('gpsText').textContent = '已停止';
        }
    </script>
</body>
</html>
