name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  GO_VERSION: '1.21'
  PYTHON_VERSION: '3.11'

jobs:
  # ==============================
  # Go Services (M03)
  # ==============================
  test-m03:
    name: Test M03 Trajectory Service
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./m03-trajectory
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: ${{ env.GO_VERSION }}
    
    - name: Cache Go modules
      uses: actions/cache@v3
      with:
        path: ~/go/pkg/mod
        key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
        restore-keys: |
          ${{ runner.os }}-go-
    
    - name: Download dependencies
      run: go mod download
    
    - name: Run tests
      run: go test -v -race -coverprofile=coverage.out ./...
    
    - name: Generate coverage report
      run: go tool cover -html=coverage.out -o coverage.html
    
    - name: Upload coverage
      uses: codecov/codecov-action@v3
      with:
        files: ./m03-trajectory/coverage.out
        flags: m03
        name: m03-coverage

    - name: Build binary
      run: go build -ldflags="-w -s" -o bin/m03-trajectory ./cmd/server

  lint-m03:
    name: Lint M03
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-go@v5
      with:
        go-version: ${{ env.GO_VERSION }}
    - name: golangci-lint
      uses: golangci/golangci-lint-action@v3
      with:
        version: latest
        working-directory: ./m03-trajectory

  # ==============================
  # Python Services (M04)
  # ==============================
  test-m04:
    name: Test M04 Insight Engine
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./m04-insight-engine
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}
    
    - name: Cache pip packages
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-asyncio pytest-cov
    
    - name: Run tests
      run: pytest tests/ -v --cov=src --cov-report=xml --cov-report=html
    
    - name: Upload coverage
      uses: codecov/codecov-action@v3
      with:
        files: ./m04-insight-engine/coverage.xml
        flags: m04
        name: m04-coverage

  lint-m04:
    name: Lint M04
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: ${{ env.PYTHON_VERSION }}
    - name: Install linting tools
      run: pip install flake8 black mypy
    - name: Run flake8
      run: flake8 m04-insight-engine/src/ --max-line-length=120
    - name: Check black formatting
      run: black --check m04-insight-engine/src/

  # ==============================
  # Security Scan
  # ==============================
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'fs'
        scan-ref: '.'
        format: 'sarif'
        output: 'trivy-results.sarif'
    
    - name: Upload scan results
      uses: github/codeql-action/upload-sarif@v2
      with:
        sarif_file: 'trivy-results.sarif'

  # ==============================
  # Build Docker Images
  # ==============================
  build-docker:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: [test-m03, test-m04]
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    
    - name: Build M03
      run: |
        docker build -f docker/Dockerfile.m03 -t squirrel/m03:latest .
    
    - name: Build M04
      run: |
        docker build -f docker/Dockerfile.m04 -t squirrel/m04:latest .
    
    - name: Test docker-compose
      run: |
        cd docker
        docker-compose config

  # ==============================
  # Integration Test
  # ==============================
  integration-test:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: build-docker
    
    services:
      tidb:
        image: pingcap/tidb:v7.5.0
        ports:
          - 4000:4000
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Wait for services
      run: |
        sleep 30
        mysql -h 127.0.0.1 -P 4000 -u root -e "SELECT 1"
    
    - name: Run integration tests
      run: |
        echo "Integration tests would run here"
        # ./scripts/integration-test.sh
