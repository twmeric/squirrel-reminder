version: '3.8'

services:
  # 移动端 Web 服务
  squirrel-mobile:
    build: .
    container_name: squirrel-mobile-mvp
    ports:
      - "8080:8080"
    networks:
      - squirrel-network
    restart: unless-stopped

  # 本地 TiDB（数据存储）
  tidb:
    image: pingcap/tidb:v7.5.0
    container_name: squirrel-tidb
    ports:
      - "4000:4000"
      - "10080:10080"
    volumes:
      - tidb-data:/tidb-data
    networks:
      - squirrel-network
    restart: unless-stopped

  # Redis（缓存）
  redis:
    image: redis:7-alpine
    container_name: squirrel-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    networks:
      - squirrel-network
    restart: unless-stopped

volumes:
  tidb-data:
  redis-data:

networks:
  squirrel-network:
    driver: bridge
