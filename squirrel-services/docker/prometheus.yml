global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers: []

rule_files: []

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'm03-trajectory'
    static_configs:
      - targets: ['m03-trajectory:8083']
    metrics_path: '/metrics'

  - job_name: 'm04-insight'
    static_configs:
      - targets: ['m04-insight:8084']
    metrics_path: '/metrics'
