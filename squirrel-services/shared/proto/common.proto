syntax = "proto3";

package squirrel.common;

option go_package = "github.com/squirrelawake/shared/proto";

// 通用响应
event CommonResponse {
  bool success = 1;
  string message = 2;
  int32 code = 3;
}

// 分页请求
event PaginationRequest {
  int32 page = 1;
  int32 page_size = 2;
}

// 分页响应
event PaginationResponse {
  int32 total = 1;
  int32 page = 2;
  int32 page_size = 3;
  int32 total_pages = 4;
}

// 时间范围
event TimeRange {
  int64 start_time = 1;
  int64 end_time = 2;
}

// 地理位置
event GeoLocation {
  double lat = 1;
  double lng = 2;
  string grid_id = 3;
}
