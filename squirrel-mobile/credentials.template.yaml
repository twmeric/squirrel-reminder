# 松鼠提醒 - 生产环境 Credentials 模板
# 请填写您的真实信息后发送给我，我将立即部署生产环境

# ==================== Cloudflare ====================
cloudflare:
  # 1. 访问 https://dash.cloudflare.com/profile/api-tokens
  # 2. 创建 API Token，权限: Edit Cloudflare Workers
  api_token: "your_api_token_here"
  
  # Account ID 在 Cloudflare Dashboard 右侧
  account_id: "your_account_id_here"
  
  # 可选: 如果已有 Zone ID
  zone_id: "your_zone_id_here"

# ==================== TiDB Cloud ====================
tidb:
  # 1. 访问 https://tidbcloud.com
  # 2. 创建 Serverless Tier 集群
  # 3. 获取连接字符串
  host: "gateway.xxx.aws.tidbcloud.com"
  port: 4000
  user: "your_username"
  password: "your_password"
  database: "squirrel"
  ssl_mode: "VERIFY_IDENTITY"

# ==================== 腾讯云 (可选) ====================
tencent_cloud:
  # 如需部署到腾讯云 TKE
  secret_id: "your_secret_id"
  secret_key: "your_secret_key"
  region: "ap-hongkong"  # 香港区域

# ==================== 域名 (可选) ====================
domain:
  # 您的自定义域名
  api: "api.squirrel.couponly.io"
  web: "app.squirrel.couponly.io"
  
# ==================== 其他配置 ====================
config:
  # 应用版本
  version: "1.2.1"
  
  # 时区
  timezone: "Asia/Hong_Kong"
  
  # 日志级别: debug, info, warn, error
  log_level: "info"

# 填写完成后：
# 1. 保存为 credentials.yaml
# 2. 发送给我
# 3. 我将立即部署生产环境
