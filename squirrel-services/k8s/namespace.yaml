apiVersion: v1
kind: Namespace
metadata:
  name: squirrel
  labels:
    name: squirrel
    environment: production
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: squirrel-quota
  namespace: squirrel
spec:
  hard:
    requests.cpu: "10"
    requests.memory: 20Gi
    limits.cpu: "20"
    limits.memory: 40Gi
    pods: "50"
---
apiVersion: v1
kind: LimitRange
metadata:
  name: squirrel-limits
  namespace: squirrel
spec:
  limits:
  - default:
      cpu: "2"
      memory: 2Gi
    defaultRequest:
      cpu: 100m
      memory: 256Mi
    type: Container
