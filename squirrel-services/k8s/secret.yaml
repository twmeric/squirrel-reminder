apiVersion: v1
kind: Secret
metadata:
  name: squirrel-secrets
  namespace: squirrel
type: Opaque
stringData:
  tidb-dsn: "root:password@tcp(tidb.squirrel.svc.cluster.local:4000)/squirrel?parseTime=true"
  redis-password: ""
  jwt-secret: "change-this-in-production"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: squirrel-config
  namespace: squirrel
data:
  ENVIRONMENT: "production"
  LOG_LEVEL: "info"
  METRICS_ENABLED: "true"
  TRACING_ENABLED: "true"
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: squirrel-sa
  namespace: squirrel
  annotations:
    # 如果需要IAM角色，在这里配置
    # eks.amazonaws.com/role-arn: arn:aws:iam::ACCOUNT:role/squirrel-role
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: squirrel-role
  namespace: squirrel
rules:
- apiGroups: [""]
  resources: ["configmaps", "secrets"]
  verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: squirrel-role-binding
  namespace: squirrel
subjects:
- kind: ServiceAccount
  name: squirrel-sa
  namespace: squirrel
roleRef:
  kind: Role
  name: squirrel-role
  apiGroup: rbac.authorization.k8s.io
