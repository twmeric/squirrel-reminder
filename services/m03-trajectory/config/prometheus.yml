# Prometheus配置
global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

rule_files:
  - /etc/prometheus/rules/*.yml

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'm03-trajectory'
    static_configs:
      - targets: ['m03:9090']
    metrics_path: '/metrics'
    scrape_interval: 5s
