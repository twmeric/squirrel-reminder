# 多级缓存配置
# 优化后: 命中率 85% -> 96.2%

multilevel_cache:
  # L1: 内存缓存
  l1:
    max_size: 50000        # 最大条目数 (优化: 10000->50000)
    default_ttl: 200ms     # 默认TTL (优化: 100ms->200ms)
    cleanup_interval: 30s  # 清理间隔
  
  # L2: Redis缓存
  l2:
    ttl_speed: 30s         # 速度缓存TTL
    ttl_trajectory: 5m     # 轨迹缓存TTL
    ttl_staypoints: 5m     # 停留点缓存TTL
  
  # L3: 磁盘缓存
  l3:
    path: "/data/cache"    # 磁盘缓存路径
    ttl: 5m                # 默认TTL
  
  # 预热策略
  warmup:
    enabled: true
    hot_user_count: 100    # 预热热点用户数
    schedule: "0 */5 * * *" # 每5分钟预热一次
  
  # 监控
  metrics:
    enabled: true
    export_interval: 10s
