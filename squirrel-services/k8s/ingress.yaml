apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: squirrel-ingress
  namespace: squirrel
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/rate-limit: "1000"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  tls:
  - hosts:
    - api.squirrel.couponly.io
    secretName: squirrel-tls
  rules:
  - host: api.squirrel.couponly.io
    http:
      paths:
      - path: /m03
        pathType: Prefix
        backend:
          service:
            name: m03-trajectory
            port:
              number: 8083
      - path: /m04
        pathType: Prefix
        backend:
          service:
            name: m04-insight
            port:
              number: 8084
      - path: /health
        pathType: Exact
        backend:
          service:
            name: m03-trajectory
            port:
              number: 8083
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: squirrel-network-policy
  namespace: squirrel
spec:
  podSelector: {}
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          name: ingress-nginx
    ports:
    - protocol: TCP
      port: 8083
    - protocol: TCP
      port: 8084
  - from:
    - podSelector: {}
    ports:
    - protocol: TCP
      port: 50053
  egress:
  - to:
    - podSelector: {}
    ports:
    - protocol: TCP
      port: 4000
    - protocol: TCP
      port: 6379
    - protocol: TCP
      port: 50053
  - to:
    - namespaceSelector: {}
      podSelector:
        matchLabels:
          k8s-app: kube-dns
    ports:
    - protocol: UDP
      port: 53
